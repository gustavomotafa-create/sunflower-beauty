<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Post - Sunflower Beauty</title>
  <link rel="stylesheet" href="style.css">

  <!-- 🔥 Markdown -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    .post-page {
      max-width: 1180px;
      margin: 0 auto;
      padding: 26px 20px 46px;
    }

    .post-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .voltar-post {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #d89b1d;
      text-decoration: none;
      font-weight: bold;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(239, 223, 187, 0.9);
      box-shadow: 0 8px 18px rgba(176, 132, 76, 0.08);
      transition: 0.25s ease;
    }

    .voltar-post:hover {
      transform: translateY(-2px);
    }

    .post-shell {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 320px;
      gap: 24px;
      align-items: start;
    }

    .post-completo {
      background: rgba(255, 253, 249, 0.94);
      border: 1px solid rgba(240, 225, 186, 0.95);
      border-radius: 28px;
      padding: 26px;
      box-shadow: 0 16px 34px rgba(176, 132, 76, 0.10);
      backdrop-filter: blur(10px);
    }

    .post-header {
      margin-bottom: 20px;
    }

    .post-header h1 {
      font-size: 2.7rem;
      line-height: 1.06;
      letter-spacing: -0.9px;
      margin: 14px 0 12px;
      color: var(--title);
    }

    .meta-post {
      color: #8d735f;
      margin: 0;
      font-size: 14px;
      line-height: 1.7;
    }

    .post-completo img {
      width: 100%;
      max-height: 470px;
      object-fit: cover;
      border-radius: 18px;
      margin: 22px 0;
      background: #fff7e8;
      box-shadow: 0 10px 22px rgba(176, 132, 76, 0.10);
    }

    .texto-post {
      color: #6f5a49;
      line-height: 1.9;
      font-size: 1.02rem;
    }

    .texto-post h1,
    .texto-post h2,
    .texto-post h3,
    .texto-post h4,
    .texto-post h5,
    .texto-post h6 {
      color: var(--title);
      line-height: 1.2;
      margin: 26px 0 14px;
      font-weight: 800;
    }

    .texto-post h1 { font-size: 2rem; }
    .texto-post h2 { font-size: 1.7rem; }
    .texto-post h3 { font-size: 1.4rem; }
    .texto-post h4 { font-size: 1.2rem; }

    .texto-post p {
      margin: 0 0 6px;
    }

    .texto-post ul,
    .texto-post ol {
      margin: 6px 0 16px 22px;
      padding: 0;
    }

    .texto-post li {
      margin-bottom: 6px;
    }

    .texto-post strong {
      color: #4f3a2b;
      font-weight: 800;
    }

    .texto-post blockquote {
      margin: 20px 0;
      padding: 14px 18px;
      background: #fff8ef;
      border-left: 4px solid #f5c542;
      border-radius: 12px;
      color: #7a6554;
    }

    .texto-post hr {
      border: none;
      border-top: 1px solid #efdca8;
      margin: 28px 0;
    }

    .texto-post a {
      color: #c9880f;
      font-weight: 700;
      text-decoration: none;
    }

    .texto-post a:hover {
      text-decoration: underline;
    }

    .nota-post {
      margin: 22px 0;
      padding: 16px 18px;
      background: linear-gradient(135deg, #fff8e8, #fff3dc);
      border: 1px solid #efdca8;
      border-radius: 14px;
      font-weight: bold;
      color: #6a4d38;
    }

    .caixa-links-post {
      margin-top: 28px;
      padding: 20px;
      background: #fff8ea;
      border: 1px solid #f0d596;
      border-radius: 18px;
    }

    .caixa-links-post h3 {
      margin: 0 0 12px;
      color: var(--title);
    }

    .links-produto {
      display: flex;
      gap: 12px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    .botao-link-post {
      padding: 12px 16px;
      border-radius: 12px;
      font-weight: bold;
      text-decoration: none;
      transition: 0.25s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .botao-link-post:hover {
      transform: translateY(-2px);
    }

    .botao-original {
      background: linear-gradient(135deg, #f5c542, #e6b83f);
      color: #4a3524;
      box-shadow: 0 10px 20px rgba(243, 198, 77, 0.18);
    }

    .botao-barato {
      background: #fff;
      border: 1px solid #ddd;
      color: #4a3524;
    }

    .frase-review {
      margin-top: 24px;
      padding: 14px 16px;
      background: #fffaf2;
      border-left: 4px solid #f5c542;
      border-radius: 12px;
      color: #7a6554;
      line-height: 1.8;
    }

    .post-lateral {
      display: grid;
      gap: 16px;
      position: sticky;
      top: 118px;
    }

    .post-side-card {
      padding: 20px;
      border-radius: 24px;
      background: rgba(255, 253, 249, 0.84);
      border: 1px solid rgba(239, 223, 187, 0.92);
      box-shadow: 0 14px 30px rgba(176, 132, 76, 0.10);
      backdrop-filter: blur(10px);
    }

    .post-side-card strong {
      display: block;
      margin-bottom: 8px;
      font-size: 15px;
      color: var(--title);
    }

    .post-side-card span {
      color: var(--text-soft);
      line-height: 1.7;
      font-size: 14px;
    }

    @media (max-width: 980px) {
      .post-shell {
        grid-template-columns: 1fr;
      }

      .post-lateral {
        position: static;
      }
    }
  </style>
</head>

<body>
  <div class="site-bg"></div>

  <header class="topo">
    <div class="topo-conteudo">
      <a href="index.html" class="logo-wrap">
        <img src="imagens/logo.png" alt="Logo Sunflower Beauty">
        <div class="logo-texto">
          <h1><span class="laranja">Sunflower</span> Beauty 🌻</h1>
          <p>Beleza real, feminina e acessível</p>
        </div>
      </a>
    </div>
  </header>

  <main class="post-page">
    <div class="post-shell">
      <div id="post-container"></div>
    </div>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

    const app = initializeApp({
      apiKey: "AIza...",
      authDomain: "sunflower...",
      projectId: "sunflower..."
    });

    const db = getFirestore(app);

    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");
    const container = document.getElementById("post-container");

    function renderMarkdown(texto = "") {
      let html = marked.parse(texto);

      html = html.replace(/<\/p>\s*<ul>/g, "</p><ul>");
      html = html.replace(/<\/p>\s*<ol>/g, "</p><ol>");

      return html;
    }

    async function carregarPost() {
      const ref = doc(db, "posts", id);
      const snap = await getDoc(ref);
      const post = snap.data();

      container.innerHTML = `
        <article class="post-completo">
          <div class="post-header">
            <h1>${post.titulo}</h1>
          </div>

          <div class="texto-post">
            ${renderMarkdown(post.descricao)}
          </div>
        </article>
      `;
    }

    carregarPost();
  </script>
</body>
</html>
